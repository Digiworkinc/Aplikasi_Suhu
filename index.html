<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Cuaca</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Animasi kustom sederhana */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body id="main-bg" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-400 to-blue-200 p-4 transition-colors duration-500 font-sans">
    
    <div class="bg-white/20 backdrop-blur-lg border border-white/30 p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-md text-slate-800">
        
        <!-- Header -->
        <h1 class="text-2xl font-bold text-center text-white mb-6 drop-shadow-md">
            Aplikasi Cuaca
        </h1>
        
        <!-- Form Pencarian -->
        <form id="search-form" class="relative mb-8">
            <input 
                type="text" 
                id="search-input"
                placeholder="Cari kota..." 
                class="w-full pl-5 pr-12 py-3 rounded-full bg-white/50 border border-white/50 focus:outline-none focus:ring-2 focus:ring-white/70 focus:bg-white/70 transition-all placeholder-slate-500 font-medium"
                required
            />
            <button 
                type="submit" 
                id="search-btn"
                class="absolute right-2 top-1/2 -translate-y-1/2 p-2 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition-colors disabled:opacity-50"
            >
                <i data-lucide="search" class="w-5 h-5" id="search-icon"></i>
                <i data-lucide="loader-2" class="w-5 h-5 animate-spin hidden" id="loading-icon"></i>
            </button>
        </form>

        <!-- Container Pesan Error -->
        <div id="error-container" class="hidden flex items-center gap-2 p-4 mb-6 text-red-700 bg-red-100/80 rounded-xl">
            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
            <p id="error-text" class="text-sm font-medium"></p>
        </div>

        <!-- Skeleton Loading -->
        <div id="loading-skeleton" class="hidden flex-col items-center gap-4 animate-pulse">
            <div class="w-48 h-8 bg-white/20 rounded-md"></div>
            <div class="w-24 h-24 bg-white/20 rounded-full my-4"></div>
            <div class="w-32 h-16 bg-white/20 rounded-md"></div>
            <div class="grid grid-cols-2 gap-4 w-full mt-4">
                <div class="h-20 bg-white/20 rounded-2xl"></div>
                <div class="h-20 bg-white/20 rounded-2xl"></div>
            </div>
        </div>

        <!-- Container Data Cuaca -->
        <div id="weather-container" class="hidden flex-col items-center fade-in">
            
            <!-- Lokasi -->
            <div class="flex items-center gap-2 text-white mb-4">
                <i data-lucide="map-pin" class="w-6 h-6"></i>
                <h2 id="city-name" class="text-3xl font-bold tracking-tight"></h2>
            </div>
            <p id="country-name" class="text-white/80 font-medium mb-6"></p>

            <!-- Ikon & Suhu Utama -->
            <div class="flex flex-col items-center mb-8">
                <div id="weather-icon-container" class="drop-shadow-lg mb-4">
                    <!-- Ikon cuaca akan disisipkan di sini -->
                </div>
                <div class="flex items-start text-white">
                    <span id="temperature" class="text-7xl font-black tracking-tighter"></span>
                    <span class="text-2xl font-bold mt-2">°C</span>
                </div>
                <p id="weather-desc" class="text-xl font-medium text-white/90 capitalize mt-2"></p>
            </div>

            <!-- Grid Informasi Tambahan -->
            <div class="grid grid-cols-2 gap-4 w-full">
                <!-- Kelembapan -->
                <div class="bg-white/30 rounded-2xl p-4 flex items-center gap-4">
                    <i data-lucide="droplets" class="w-8 h-8 text-blue-100"></i>
                    <div>
                        <p class="text-xs text-white/80 font-semibold uppercase">Kelembapan</p>
                        <p class="text-lg font-bold text-white"><span id="humidity"></span>%</p>
                    </div>
                </div>
                
                <!-- Angin -->
                <div class="bg-white/30 rounded-2xl p-4 flex items-center gap-4">
                    <i data-lucide="wind" class="w-8 h-8 text-blue-100"></i>
                    <div>
                        <p class="text-xs text-white/80 font-semibold uppercase">Angin</p>
                        <p class="text-lg font-bold text-white"><span id="wind-speed"></span> km/h</p>
                    </div>
                </div>

                <!-- Terasa Seperti -->
                <div class="bg-white/30 rounded-2xl p-4 flex items-center gap-4 col-span-2">
                    <div class="flex-1 flex justify-between items-center">
                        <span class="text-sm text-white/90 font-medium">Terasa seperti</span>
                        <span class="text-lg font-bold text-white"><span id="feels-like"></span>°C</span>
                    </div>
                </div>
            </div>
        </div>

    </div>
<script src="script.js"></script>
 
</body>
</html>
